[pytest]
# Stage125 Part 5 is historical and immutable, and is NOT a live Stage126
# successor-state gate. The tests inside its frozen test file that are
# explicitly marked `live_successor_state` assert the Handoff successor state as
# it stood at the Part 2 reference commit, so they are historical regression
# tests rather than statements about current Stage126 state.
#
# The default suite therefore excludes ONLY that marker — never the file, and
# never by node ID. Every other test in the frozen Part 5 file stays collected
# and runnable, and no current scientific, current-state-validator, Handoff,
# final-test-lock or leakage test is excluded.
#
# The historical marked tests are verified separately, against the frozen
# reference commit, by:
#     python project/run_stage125_part5_historical_successor_tests.py
markers =
    live_successor_state: historical Stage125 Part5 successor assertions; excluded from the current Stage126 live test gate

addopts = -m "not live_successor_state"
