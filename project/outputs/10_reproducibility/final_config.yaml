# ==========================================================================
# Financial Distress Prediction — Stage121 pipeline configuration
# All paths and choices are config-driven (no hard-coded paths in code).
# Persian brief: PROGRAMMER_BRIEF_STAGE121_FA
# ==========================================================================

seed: 42

paths:
  raw_dir: "raw_handoff/financial_distress_programmer_handoff_stage121(1)"
  all_rows_csv: "modeling_all_rows_stage121.csv"
  candidates_csv: "modeling_training_candidates_stage121.csv"
  data_dictionary_csv: "data_dictionary_stage121.csv"
  missing_report_csv: "missing_data_report_stage121.csv"
  qc_json: "qc_report_stage121.json"
  outputs_dir: "outputs"

# --------------------------------------------------------------------------
# Identifier / leakage columns that must NEVER be used as model features
# (brief section 4). distressed_target_reviewed of year t is excluded too.
# --------------------------------------------------------------------------
id_leakage_columns:
  - row_key
  - ticker
  - company_name
  - fiscal_year
  - fiscal_year_end
  - unit
  - source_file
  - source_url
  - target_status_reviewed
  - distressed_flag_source_reviewed
  - data_quality_flag
  - audit_status_clean
  - statement_scope_status
  - ocf_resolution_status
  - gross_profit_resolution_status
  - distressed_target_reviewed
  - usable_for_model_flag
  - non_12_month_period_flag
  - exclusion_flag
  - manual_review_required_clean

target:
  source_label_col: "distressed_target_reviewed"   # 0/1, never modified
  candidate_flag_col: "usable_for_model_flag"
  ticker_col: "ticker"
  year_col: "fiscal_year"
  built_csv: "modeling_one_year_ahead_final.csv"

# --------------------------------------------------------------------------
# Feature sets (brief section 5). log_total_assets is engineered = log1p(total_assets).
# industry is categorical -> One-Hot (missing -> "Unknown").
# --------------------------------------------------------------------------
features:
  numeric_main:
    - leverage_ratio
    - current_ratio
    - roa_period_adjusted
    - ocf_to_assets_period_adjusted
    - financial_expense_to_assets_period_adjusted
    - operating_margin_period_adjusted
    - net_margin_period_adjusted
    - asset_turnover_period_adjusted
    - revenue_growth_period_adjusted
    - net_income_growth_period_adjusted
    - log_total_assets
  categorical:
    - industry
  # Extended set B = main + these (reported separately, robustness only)
  numeric_extended_extra:
    - roe_period_adjusted
    - debt_to_equity
    - accumulated_loss_to_capital_ratio
    - loss_dummy
    - equity_negative_dummy
    - gross_margin_period_adjusted
    - gross_profit_period_adjusted_signedlog   # engineered: sign(x)*log1p(|x|)
  near_definition_vars:                         # robustness: drop these
    - accumulated_loss_to_capital_ratio
    - loss_dummy
    - equity_negative_dummy
  size_source_col: total_assets
  gross_profit_raw_col: gross_profit_period_adjusted

# --------------------------------------------------------------------------
# Temporal split — APPROVED REVISION (see README_RUN.md "Split rationale").
# Distress events exist only in fiscal/target years 1393-1398, so the brief's
# original test window (1401-1402) had a single positive. With written approval
# the boundary was moved earlier.
#   dev   = target_year in [1393, 1396]   (27 positives)
#   test  = target_year in [1397, 1398]   ( 9 positives)
# Built rows with target_year >= 1399 have ZERO positives AND fall after the
# test window, so they are excluded from one-year-ahead modeling (documented).
# --------------------------------------------------------------------------
split:
  split_on: "target_year"
  dev_years:  [1393, 1394, 1395, 1396]
  test_years: [1397, 1398]
  unused_years: [1399, 1400, 1401, 1402]   # no positives, post-test -> excluded
  # Expanding-window validation folds inside dev (train_max inclusive -> val_year)
  cv_folds:
    - {train_max_year: 1393, val_year: 1394}
    - {train_max_year: 1394, val_year: 1395}
    - {train_max_year: 1395, val_year: 1396}

# --------------------------------------------------------------------------
# Imbalance handling (brief section 10). Cost-sensitive is the MAIN method.
# --------------------------------------------------------------------------
imbalance:
  method: "class_weight"        # main; "smote" used only in robustness
  smote_k_neighbors: 3          # tiny positive class -> small k

# --------------------------------------------------------------------------
# Threshold selection (brief section 12): chosen on validation only.
# --------------------------------------------------------------------------
threshold:
  primary_objective: "f1"       # primary, declared in advance
  secondary_objective: "balanced_accuracy"
  grid_points: 200

# --------------------------------------------------------------------------
# Tuning (brief section 11). Optuna; primary metric = mean validation PR-AUC.
# Search spaces live here so they are reproducible.
# --------------------------------------------------------------------------
tuning:
  method: "optuna"
  n_trials: 60
  primary_metric: "pr_auc"      # average precision averaged over folds
  logistic:
    penalty: ["l1", "l2", "elasticnet"]
    C_log10_low: -3.0
    C_log10_high: 2.0
    l1_ratio_low: 0.0
    l1_ratio_high: 1.0
    max_iter: 5000
  random_forest:
    n_estimators_low: 300
    n_estimators_high: 900
    max_depth_choices: [3, 4, 6, 8, 12, null]
    min_samples_split_low: 2
    min_samples_split_high: 20
    min_samples_leaf_low: 1
    min_samples_leaf_high: 15
    max_features_choices: ["sqrt", "log2", 0.5, 0.8]
    class_weight_choices: ["balanced", "balanced_subsample"]
    final_min_trees: 500
  xgboost:
    n_estimators_low: 200
    n_estimators_high: 1200
    learning_rate_log10_low: -2.3
    learning_rate_log10_high: -0.5
    max_depth_low: 2
    max_depth_high: 6
    min_child_weight_low: 1
    min_child_weight_high: 10
    subsample_low: 0.6
    subsample_high: 1.0
    colsample_bytree_low: 0.6
    colsample_bytree_high: 1.0
    gamma_low: 0.0
    gamma_high: 5.0
    reg_alpha_log10_low: -3.0
    reg_alpha_log10_high: 1.0
    reg_lambda_log10_low: -2.0
    reg_lambda_log10_high: 1.5
    early_stopping_rounds: 50

# --------------------------------------------------------------------------
# Final-model stability & evaluation (brief sections 12, 13).
# --------------------------------------------------------------------------
stability:
  n_seeds: 30
  seeds_start: 1000             # seeds = range(seeds_start, seeds_start+n_seeds)

evaluation:
  bootstrap_n: 1000
  bootstrap_cluster_col: "ticker"
  ci_alpha: 0.05

robustness:
  winsor_lower: 0.01
  winsor_upper: 0.99

figures:
  dpi: 300
  formats: ["png", "pdf"]

run:
  # Master switches so the whole thing runs with one command but stays tunable.
  do_tuning: true
  do_seed_stability: true
  do_calibration: true
  do_shap: true
  do_robustness: true
  do_figures: true
  do_reports: true
